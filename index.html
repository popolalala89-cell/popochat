<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1976d2" />
    <title>Chat Internal</title>
    <base href="/" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Mock Capacitor untuk mencegah bridge error di browser -->
    <script>
      window.__CAPACITOR_MOCK__ = true;
      window.Capacitor = {
        isNative: false,
        isNativePlatform: function() { return false; },
        getPlatform: function() { return 'web'; },
        isPluginAvailable: function() { return false; },
        registerPlugin: function() { return {}; },
        addListener: function() {},
        removeAllListeners: function() {},
        convertFileSrc: function(p) { return p; },
      };
      window.CapacitorPlugins = {};
      // Cegah Capacitor bridge mencoba native bridge
      if (!window.webkit) window.webkit = {};
      if (!window.webkit.messageHandlers) window.webkit.messageHandlers = {};
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
